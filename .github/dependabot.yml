version: 2

# Track upgradability of the core dependency, @ai-hero/sandcastle. Dependabot
# opens each bump as its own branch off main (created fresh each time, deleted
# after merge — the natural ephemeral lifecycle); CI gates it on the PR, and
# green patch/minor bumps auto-merge to main (see dependabot-auto-merge.yml).
# Branch protection on main requires the `sandcastle` check, so auto-merge waits
# for green CI. Major bumps are left for manual review.
updates:
  - package-ecosystem: "npm"
    directory: "/.sandcastle" # where package.json / package-lock.json live
    schedule:
      interval: "weekly"
    # Only this dependency — we're tracking sandcastle's upgradability, not a
    # general dependency sweep.
    allow:
      - dependency-name: "@ai-hero/sandcastle"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "sandcastle-upgrade"
