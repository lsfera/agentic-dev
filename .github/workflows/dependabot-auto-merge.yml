name: dependabot-auto-merge

# Auto-merge green @ai-hero/sandcastle bumps on the sandcastle-upgrades branch.
# Enables GitHub's native auto-merge for PATCH and MINOR bumps; MAJOR bumps are
# left for manual review (an API change deserves eyes). Auto-merge waits for the
# required `sandcastle` check (branch protection on sandcastle-upgrades), so a bump
# only lands once CI is green.
#
# pull_request_target runs in the base-branch context with a write token (Dependabot
# PRs otherwise get a read-only token). Safe here: we never check out or execute the
# PR's code — we only read metadata and call `gh pr merge`.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch & minor sandcastle bumps
        if: >
          steps.meta.outputs.dependency-names == '@ai-hero/sandcastle' &&
          (steps.meta.outputs.update-type == 'version-update:semver-patch' ||
           steps.meta.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
