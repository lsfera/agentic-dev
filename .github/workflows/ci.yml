name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  sandcastle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .sandcastle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck
      - run: npm test
