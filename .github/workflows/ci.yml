name: ci

on:
  pull_request:
    # `sandcastle-upgrades` is the dedicated branch Dependabot opens
    # @ai-hero/sandcastle bump PRs against (see .github/dependabot.yml), so its
    # PRs run the typecheck + tests here.
    branches: [main, sandcastle-upgrades]
  push:
    branches: [main, sandcastle-upgrades]

jobs:
  sandcastle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .sandcastle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck
      - run: npm test
